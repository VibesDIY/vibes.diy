<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 75">
  <!-- Main black pill background -->
  <rect x="0" y="0" width="300" height="75" rx="37.5" ry="37.5" fill="#231F20"/>

  <!-- Ivory/cream inner pill for VIBES -->
  <rect x="4" y="4" width="160" height="67" rx="33.5" ry="33.5" fill="#FFFFF0"/>

  <!-- VIBES text - styled to match the chunky rounded font -->
  <text x="84" y="50" font-family="Arial Rounded MT Bold, Arial Black, sans-serif" font-size="34" font-weight="900" fill="#231F20" text-anchor="middle" letter-spacing="-2">VIBES</text>

  <!-- D·I·Y text -->
  <text x="230" y="48" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#FFFFF0" text-anchor="middle" letter-spacing="6">D·I·Y</text>
</svg>