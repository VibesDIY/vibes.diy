name: "use-vibes-publish"
description: "publish-the-use-vibes"
inputs:
  NPM_TOKEN:
    description: "NPM token for publishing packages"
    required: true
runs:
  using: "composite"
  steps:
    - name: publish-prompts
      id: prompts
      shell: bash
      working-directory: prompts/pkg
      env:
        NPM_TOKEN: ${{ inputs.NPM_TOKEN }}
      run: |
        set -e
        echo "GITHUB_REF->"$GITHUB_REF
        echo "//registry.npmjs.org/:_authToken=${{ inputs.NPM_TOKEN }}" > ~/.npmrc
        mkdir -p dist
        echo "//registry.npmjs.org/:_authToken=${{ inputs.NPM_TOKEN }}" > dist/.npmrc
        pnpm run publish --registry https://registry.npmjs.org/
    - name: publish-call-ai
      id: callai
      if: success()
      shell: bash
      working-directory: call-ai/pkg
      env:
        NPM_TOKEN: ${{ inputs.NPM_TOKEN }}
      run: |
        set -e
        echo "GITHUB_REF->"$GITHUB_REF
        echo "//registry.npmjs.org/:_authToken=${{ inputs.NPM_TOKEN }}" > ~/.npmrc
        mkdir -p dist
        echo "//registry.npmjs.org/:_authToken=${{ inputs.NPM_TOKEN }}" > dist/.npmrc
        pnpm run publish --registry https://registry.npmjs.org/
    - name: publish-types
      id: types
      if: success()
      shell: bash
      working-directory: use-vibes/types
      env:
        NPM_TOKEN: ${{ inputs.NPM_TOKEN }}
      run: |
        set -e
        echo "GITHUB_REF->"$GITHUB_REF
        echo "//registry.npmjs.org/:_authToken=${{ inputs.NPM_TOKEN }}" > ~/.npmrc
        mkdir -p dist
        echo "//registry.npmjs.org/:_authToken=${{ inputs.NPM_TOKEN }}" > dist/.npmrc
        pnpm run publish --registry https://registry.npmjs.org/
    - name: publish-base
      id: base
      if: success()
      shell: bash
      working-directory: use-vibes/base
      env:
        NPM_TOKEN: ${{ inputs.NPM_TOKEN }}
      run: |
        set -e
        echo "GITHUB_REF->"$GITHUB_REF
        echo "//registry.npmjs.org/:_authToken=${{ inputs.NPM_TOKEN }}" > ~/.npmrc
        mkdir -p dist
        echo "//registry.npmjs.org/:_authToken=${{ inputs.NPM_TOKEN }}" > dist/.npmrc
        pnpm run publish --registry https://registry.npmjs.org/
    - name: publish-use-vibes
      id: use-vibes
      if: success()
      shell: bash
      working-directory: use-vibes/pkg
      env:
        NPM_TOKEN: ${{ inputs.NPM_TOKEN }}
      run: |
        set -e
        echo "GITHUB_REF->"$GITHUB_REF
        # Extract version from tag: use-vibes@v0.19.18-dev-cli → 0.19.18-dev-cli
        VERSION="${GITHUB_REF#refs/tags/use-vibes@v}"
        echo "Publishing use-vibes@${VERSION} via dnt"
        # Build npm package via dnt
        PACKAGE_VERSION="$VERSION" deno run -A build-npm.ts
        # Publish from dnt output
        echo "//registry.npmjs.org/:_authToken=${{ inputs.NPM_TOKEN }}" > dist/npm/.npmrc
        cd dist/npm && npm publish --registry https://registry.npmjs.org/
    - name: publish-jsr
      id: jsr
      if: success()
      shell: bash
      working-directory: use-vibes/pkg
      run: |
        set -e
        VERSION="${GITHUB_REF#refs/tags/use-vibes@v}"
        echo "Publishing @vibes-diy/use-vibes@${VERSION} to JSR"
        # Inject version + rewrite workspace imports to npm: specifiers for JSR
        deno eval "
          const f = 'deno.json';
          const j = JSON.parse(Deno.readTextFileSync(f));
          j.version = '${VERSION}';
          j.nodeModulesDir = 'auto';
          j.imports = {
            '@vibes.diy/prompts': 'npm:@vibes.diy/prompts@${VERSION}',
            '@vibes.diy/use-vibes-types': 'npm:@vibes.diy/use-vibes-types@${VERSION}',
            'call-ai': 'npm:call-ai@${VERSION}'
          };
          Deno.writeTextFileSync(f, JSON.stringify(j, null, 2) + '\n');
        "
        deno publish --allow-dirty
