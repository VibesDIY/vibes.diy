name: "setup-runtime"
description: "setup  runtime"
inputs:
  skip-tests-if-sha-green:
    description: >-
      When "true", skip the ~5-min Docker test step if this exact commit SHA
      already has a successful `compile_test` check (i.e. it was tested
      "upstream" — e.g. a deploy tag cut from an already-green PR head). ci.yaml
      leaves this "false" because it IS the source of truth; deploy jobs set it
      "true". Requires the job to grant `checks: read`. Falls back to running the
      full suite whenever the SHA has no green check (rebased main commit, a
      fresh prod tag, etc.), so coverage is never silently dropped.
    required: false
    default: "false"
runs:
  using: composite
  steps:
    # Pre-test step timings: each step appends "<label>\t<seconds>" to a shared
    # TSV in $RUNNER_TEMP; the "pre-test step timings" step at the end renders
    # them into the job summary. Lets us see dumb work in install/lint/build
    # without scraping the composite step's collapsed logs.
    - name: mark-runtime-start
      shell: bash
      run: date +%s > "$RUNNER_TEMP/_runtime_t0"

    - uses: ./actions/runtime

    - name: record-runtime-timing
      shell: bash
      run: |
        if [ -f "$RUNNER_TEMP/_runtime_t0" ]; then
          printf 'runtime-setup\t%s\n' "$(( $(date +%s) - $(cat "$RUNNER_TEMP/_runtime_t0") ))" >> "$RUNNER_TEMP/pretest-timings.tsv"
        fi

    - name: install
      shell: bash
      run: |
        _t0=$(date +%s)
        pnpm remove -r playwright-chromium
        pnpm install
        pnpm dedupe --check
        printf 'install\t%s\n' "$(( $(date +%s) - _t0 ))" >> "$RUNNER_TEMP/pretest-timings.tsv"

    # Persist the eslint/prettier caches across CI runs so incremental PRs only
    # re-lint / re-check the files that actually changed. Both tools run with the
    # content-hash strategy (the root "lint" and "format" scripts), so the caches
    # survive fresh checkouts where file mtimes always differ.
    #
    # The key (and restore prefix) include a hash of the lockfile + lint/format
    # config so a dependency or config change starts from a cold cache. eslint's
    # --cache only re-checks changed *files*, not changed rule implementations, so
    # restoring a cache built against an older eslint/plugin/config set could miss
    # new lint failures on a deps-only PR (false green). Same dep+config set →
    # incremental hit; deps/config change → full re-lint.
    - name: restore-lint-caches
      uses: actions/cache@v4
      with:
        path: |
          .eslintcache
          .prettiercache
        key: lint-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'eslint.config.mjs', '.prettierrc', 'package.json') }}-${{ github.sha }}
        restore-keys: |
          lint-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'eslint.config.mjs', '.prettierrc', 'package.json') }}-

    # Pre-pull the Playwright test image in the background so its ~24s download
    # overlaps with format-check + lint + build instead of blocking the test
    # step's `docker run`. The tag matches the resolved Playwright version (same
    # source of truth as the test step). Best-effort: failures here are harmless
    # — the test step pulls synchronously if the image isn't ready yet.
    - name: prepull-playwright-image
      shell: bash
      run: |
        PW=$(pnpm exec playwright --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)
        if [ -n "$PW" ]; then
          IMG="mcr.microsoft.com/playwright:v${PW}-noble"
          echo "Pre-pulling ${IMG} in the background"
          nohup docker pull "$IMG" >"$RUNNER_TEMP/pw-prepull.log" 2>&1 &
          disown || true
        else
          echo "Playwright version unresolved; skipping pre-pull (test step will pull)."
        fi

    - name: format-check
      shell: bash
      run: |
        _t0=$(date +%s)
        # Unchanged behavior; the `format` script now passes --cache (content
        # strategy, .prettiercache restored above) so unchanged files are skipped
        # on incremental runs.
        pnpm run format --check
        printf 'format-check\t%s\n' "$(( $(date +%s) - _t0 ))" >> "$RUNNER_TEMP/pretest-timings.tsv"

    # No standalone rules-bag step: `pnpm run lint` already runs
    # check-rules-bag-constructors.mjs as its first action (see the root
    # package.json "lint" script), so a dedicated step here just re-ran the
    # same check. Local PR-readiness still uses `pnpm run rules-bag:constructors`
    # per CLAUDE.md; CI enforcement lives in the lint step below.
    - name: lint
      shell: bash
      run: |
        _t0=$(date +%s)
        NODE_OPTIONS=--max-old-space-size=4096 pnpm run lint
        printf 'lint\t%s\n' "$(( $(date +%s) - _t0 ))" >> "$RUNNER_TEMP/pretest-timings.tsv"

    # Build temporarily disabled due to pre-existing TypeScript errors in hosting/pkg and vibes.diy/pkg
    - name: build
      shell: bash
      run: |
        _t0=$(date +%s)
        pnpm run build
        printf 'build\t%s\n' "$(( $(date +%s) - _t0 ))" >> "$RUNNER_TEMP/pretest-timings.tsv"

    # Decide whether the test step below can be skipped because this exact SHA
    # was already tested upstream. Only acts when the caller opts in via
    # skip-tests-if-sha-green=true (deploy jobs). Matches on a *successful*
    # check named `compile_test` (the in-progress self-check has conclusion
    # null, so it never matches itself); both ci.yaml and the deploy jobs run
    # the same suite under that job name, so a green check is faithful coverage.
    - name: check-sha-tested
      id: gate
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        SKIP_IF_GREEN: ${{ inputs.skip-tests-if-sha-green }}
        SHA: ${{ github.sha }}
        REPO: ${{ github.repository }}
      run: |
        echo "skip_tests=false" >> "$GITHUB_OUTPUT"
        if [ "$SKIP_IF_GREEN" != "true" ]; then
          echo "skip-tests-if-sha-green not set — running the full suite."
          exit 0
        fi
        # gh is preinstalled on GitHub-hosted runners. Count successful
        # compile_test checks on this commit; tolerate API hiccups by treating
        # an error as "no green check" (fail safe → run the tests).
        GREEN=$(gh api "repos/${REPO}/commits/${SHA}/check-runs" --paginate \
          --jq '[.check_runs[] | select(.name=="compile_test" and .conclusion=="success")] | length' \
          2>/dev/null | awk '{s+=$1} END {print s+0}')
        if [ "${GREEN:-0}" -ge 1 ]; then
          echo "skip_tests=true" >> "$GITHUB_OUTPUT"
          echo "✅ ${SHA} already has a green compile_test check — skipping the test re-run." \
            >> "${GITHUB_STEP_SUMMARY:-/dev/stdout}"
          echo "Found a green compile_test check on ${SHA} — skipping the test re-run."
        else
          echo "No green compile_test check on ${SHA} — running the full suite."
        fi

    - name: test
      if: ${{ steps.gate.outputs.skip_tests != 'true' }}
      shell: bash
      env:
        # Single switch that flips the test suite from "surfaced" to "blocking".
        # "true" → a red suite fails the job (CI gates on tests). This is the
        # close-out of #2426, enabled once the deterministic failures (#2425)
        # were fixed and `pnpm test` exits 0 (#2444). A failing test now blocks
        # the PR — rerun to clear a flake (no retry-on-flake wrapper). Harness/
        # setup/timeout errors always block regardless of this switch.
        # See agents/flaky-tests.md.
        VIBES_CI_GATE_TESTS: "true"
      run: |
        # Resolve the Playwright version that vitest actually loads, so the
        # docker image's bundled browsers match. `pnpm exec playwright --version`
        # is the source of truth (the old `pnpm why … --json` path returned empty
        # under pnpm 10, producing a `:v-noble` tag that 125'd before any test
        # ran — #2426). Fail fast on an empty value rather than docker-pull a
        # malformed tag.
        PLAYWRIGHT_VERSION=$(pnpm exec playwright --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
        if [ -z "$PLAYWRIGHT_VERSION" ]; then
          echo "::error title=Playwright version unresolved::Could not determine the Playwright version; refusing to run docker with a malformed image tag (would be ':v-noble'). See #2426."
          exit 1
        fi
        echo "Using Playwright image mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-noble"
        # The vitest globalSetup shells out to `pnpm exec drizzle-kit` from inside
        # the container, but the Playwright image ships only node/npm — so the
        # suite died at setup with `pnpm: command not found` (exit 127). The
        # host's pnpm doesn't cross into docker; activate a matching pnpm via
        # corepack inside the container. See #2426.
        PNPM_VERSION=$(pnpm --version)
        if [ -z "$PNPM_VERSION" ]; then
          echo "::error title=pnpm version unresolved::Could not determine the host pnpm version to activate inside the container. See #2426."
          exit 1
        fi
        # No more `|| true`: the suite's exit code is captured, never discarded.
        # Timeout raised from 120s (which SIGKILLed the ~240s suite mid-run) to
        # 30m so the suite actually runs to completion. See #2426.
        #
        # vitest runs with machine-readable reporters only (no pretty reporter):
        # the json reporter is the baseline report (test-timing.json), plus the
        # phase reporter added below (test-phase-timing.json). Raw stdout (corepack
        # + any test console output + uncaught errors) still streams to the Actions
        # log for live debugging, and those reports drive both the job summary and
        # the uploaded artifact (accurate per-file durations — no scraping ANSI).
        # A second reporter (tools/vitest-phase-reporter.ts, transformed by
        # vitest on load) writes test-phase-timing.json with per-file PRE-RUN
        # phase costs (collect / setup / environment / prepare) — the json
        # reporter only exposes start/end, which hides where the import phase goes.
        rm -f test-timing.json test-phase-timing.json
        set +e
        timeout 1800 docker run --rm \
          -v $(pwd):/work \
          -w /work \
          mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-noble \
          bash -c "corepack enable && corepack prepare pnpm@${PNPM_VERSION} --activate && npm run test -- --reporter=json --outputFile=test-timing.json --reporter=./tools/vitest-phase-reporter.ts"
        TEST_EXIT=$?
        set -e

        # The container above runs as root and bind-mounts the host checkout, so
        # it writes root-owned files into the workspace (node_modules/.vite-temp,
        # test-timing.json, test-phase-timing.json, drizzle-kit artifacts). When this
        # same checkout is reused by a later non-root step in the same job — the
        # deploy jobs' `pnpm run build` → vite writing node_modules/.vite-temp —
        # that step hits EACCES. Restore ownership to the runner user so the
        # build can write. (Tag deploy run 27803874292 / vibes-diy@c2.5.9 failed
        # exactly here; PR CI never saw it because the build is deploy-only.)
        sudo chown -R "$(id -u):$(id -g)" "$(pwd)" || true

        # Parse test-timing.json into the job summary (totals + Top-20 slowest
        # files + any failures). HAVE_JSON=0 means the suite produced no report
        # — treated as a harness/setup error below, exactly like the old "empty
        # TOTALS" check that guards against the #2426 false-green. The parser
        # never fails the step itself (it only writes the summary); gating stays
        # driven by TEST_EXIT + HAVE_JSON.
        HAVE_JSON=0
        if [ -s test-timing.json ] && python3 "${GITHUB_ACTION_PATH}/parse-test-timing.py"; then
          HAVE_JSON=1
        else
          {
            echo "## Test suite result"
            echo ""
            echo "⚠️ No machine-readable timing report (\`test-timing.json\` missing or empty) — the suite likely failed before reporting."
          } >> "${GITHUB_STEP_SUMMARY:-/dev/stdout}"
        fi

        if [ "$TEST_EXIT" -ne 0 ]; then
          echo "::warning title=Test suite failing::npm run test exited ${TEST_EXIT}. See the job summary for details. Tracking: #2426 (gating) / #2425 (deterministic failures)."
          # Only a clean vitest test-failure exit (1) WITH a parsed report is
          # eligible for non-blocking surfacing. A harness/setup/timeout error
          # (docker 125/126/127, timeout 124, config crash with no report) means
          # the suite never ran — that must ALWAYS fail the job, regardless of the
          # gate switch, otherwise we'd be back to the #2426 false-green.
          if [ "$TEST_EXIT" != "1" ] || [ "$HAVE_JSON" != "1" ]; then
            echo "::error title=Test harness failure::npm run test exited ${TEST_EXIT} without a valid timing report — treating as a harness/setup error and failing the job (not suppressed by VIBES_CI_GATE_TESTS)."
            exit "$TEST_EXIT"
          fi
          if [ "${VIBES_CI_GATE_TESTS}" = "true" ]; then
            echo "VIBES_CI_GATE_TESTS=true → failing the job on test failures."
            exit "$TEST_EXIT"
          fi
          echo "VIBES_CI_GATE_TESTS=false → surfacing test failures without blocking (see #2426)."
        fi

    # Persist the raw per-file/per-test timing for offline analysis and trend
    # tracking across runs. always() so a failing run's partial timing is kept
    # too; skipped when the test step was short-circuited (skip-tests-if-sha-green).
    - name: upload-test-timing
      if: ${{ always() && steps.gate.outputs.skip_tests != 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: test-timing
        path: |
          test-timing.json
          test-phase-timing.json
        if-no-files-found: ignore
        retention-days: 30

    # Render the per-step pre-test timings (see mark-runtime-start above) into
    # the job summary. always() so it reports even when a later step failed.
    - name: pre-test-step-timings
      if: ${{ always() }}
      shell: bash
      run: |
        TSV="$RUNNER_TEMP/pretest-timings.tsv"
        [ -f "$TSV" ] || { echo "no pre-test timings recorded"; exit 0; }
        {
          echo "## Pre-test step timings (seconds)"
          echo ""
          echo "| step | seconds |"
          echo "| --- | --: |"
          sort -k2 -nr "$TSV" | awk -F'\t' '{printf "| %s | %s |\n", $1, $2}'
          awk -F'\t' '{s+=$2} END{printf "| **total** | **%s** |\n", s}' "$TSV"
        } >> "${GITHUB_STEP_SUMMARY:-/dev/stdout}"
