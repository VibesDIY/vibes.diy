name: dependabot pnpm dedupe

on:
  push:
    branches: ["dependabot/npm_and_yarn/**"]
    paths: ["pnpm-lock.yaml"]

jobs:
  deduplicate:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm dedupe

      - name: Commit and push if lockfile changed
        run: |
          if [[ -z "$(git status --porcelain pnpm-lock.yaml)" ]]; then
            echo "No dedupe changes."
            exit 0
          fi
          git config user.email "ci@vibes.diy"
          git config user.name  "vibes-diy ci"
          git add pnpm-lock.yaml
          git commit -m "pnpm dedupe [dependabot skip]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
