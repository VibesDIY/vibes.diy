name: 'common ci run'
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs: a new push to the same PR (or re-dispatch on the
# same ref) supersedes the in-flight run, so let it die instead of burning
# the full suite on a commit nobody is waiting on. Pure speed/cost win — only
# the latest commit's result matters. Keyed per ref so distinct PRs never
# cancel each other. (The pr-preview workflow already does this.)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Why this is split into scope → checks + test(shards) → compile_test instead
# of one job: the bottleneck was the ~4-min Docker vitest suite running serially
# in a single `compile_test` job. vibes.diy is a PUBLIC repo, so GitHub's
# standard runners are free, unlimited, and concurrent — which makes sharding
# the suite across several of them the cost-free alternative to a paid larger
# runner (no Team plan, no per-minute billing). vitest's `--shard` splits the
# sorted test-file list, so each shard runs a disjoint slice on its own runner.
# `checks` (format + lint + typecheck) runs ONCE here rather than redundantly in
# every shard. The final `compile_test` job keeps that exact name so the
# required branch-protection check — and the `compile_test`-green lookup that
# deploy jobs use to skip the suite (actions/base check-sha-tested) — both keep
# working unchanged.
jobs:
  # Cheap gate: decide whether this PR's changes are docs-only, exposed as a job
  # output the checks/test jobs consume. The `[skip ci]` title guard lives here;
  # because checks/test/compile_test all chain off this job, skipping it cascades
  # to the whole run (matching the old single-job `[skip ci]` behavior).
  scope:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.title, '[skip ci]') }}
    outputs:
      docs_only: ${{ steps.scope.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
      - id: scope
        uses: ./actions/changed-scope

  # Publish-build guard for every published workspace package. `compile_test`
  # builds the worker via esbuild against the whole monorepo tree, so it can't
  # catch a break that only surfaces when a single package is compiled in
  # isolation for npm (an out-of-package relative import, a missing declared
  # dependency, an exports-map gap). This job runs each package's own publish
  # build so that class of regression fails the PR instead of a later release
  # (#2862; the api-svc instance of it was #2855).
  #
  # `pnpm -r run --if-present pack` runs every package's `pack` script in
  # topological order: the real ones (`core-cli build --doPack`) compile in
  # isolation and pack a tarball; the `echo`-stub and test packages no-op;
  # packages without a `pack` script (eval/*, examples) are skipped. `pack`
  # (--doPack), NOT `publish` (core-cli build): both run the same compile, but
  # `publish` pushes to the npm registry and would fail in PR CI where no
  # NPM_TOKEN exists, while `--doPack` exercises the publish build without
  # publishing. Gated on docs_only (skipped only on docs-only PRs, same as the
  # test matrix) and runs concurrently with it on a free runner, so it adds no
  # PR wall-clock. A shared-dependency change rebuilds dependents for free since
  # every package is built.
  publish_build:
    needs: scope
    if: ${{ needs.scope.outputs.docs_only != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./actions/base
        with:
          run-checks: 'false'
          run-tests: 'false'
      - run: pnpm -r run --if-present pack

  # Non-shardable work: install + format-check + lint + build(typecheck). Runs
  # once. `run-tests: 'false'` skips the Docker suite here; docs-only still skips
  # the build inside actions/base while format + lint always run.
  checks:
    needs: scope
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./actions/base
        with:
          run-tests: 'false'
          docs-only: ${{ needs.scope.outputs.docs_only }}

  # The Docker Playwright/vitest suite, fanned out across free standard runners.
  # `run-checks: 'false'` so format/lint/typecheck don't re-run per shard. Skipped
  # wholesale on docs-only PRs (no test code is affected). fail-fast: false so one
  # shard's failure doesn't cancel the others — you get the full red/green picture.
  # Bump the matrix length + the "/N" denominator together to change shard count.
  test:
    needs: scope
    if: ${{ needs.scope.outputs.docs_only != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5
      - uses: ./actions/base
        with:
          run-checks: 'false'
          shard: ${{ matrix.shard }}/4
          artifact-suffix: -shard-${{ matrix.shard }}

  # Required-check gate. Keeps the name `compile_test` so branch protection and
  # the deploy-time "is this SHA green?" lookup keep matching. Runs even when an
  # upstream job failed (a `failure` isn't `cancelled`, so `!cancelled()` is
  # still true) so it can report red; a `skipped` upstream (docs-only test, or a
  # [skip ci] cascade) counts as a pass. Mirrors the old job's `[skip ci]` skip
  # so that path is unchanged.
  #
  # Why `!cancelled()` and not `always()`: when a push supersedes the in-flight
  # run (concurrency: cancel-in-progress), every upstream concludes `cancelled`.
  # Under `always()` this gate would still run, see the all-`cancelled`
  # fingerprint, and exit 1 — a bogus red ✗ and a `failure` webhook on a run that
  # tested nothing (#2992). `!cancelled()` lets the cancellation reach the gate
  # too, so it is `skipped` alongside its upstreams instead of failing. The
  # superseding run provides the real `success`; a superseded run correctly
  # counts as neither pass nor fail.
  compile_test:
    needs: [scope, checks, test, publish_build]
    if: ${{ !cancelled() && !contains(github.event.pull_request.title, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: gate
        env:
          SCOPE_RESULT: ${{ needs.scope.result }}
          CHECKS_RESULT: ${{ needs.checks.result }}
          TEST_RESULT: ${{ needs.test.result }}
          PUBLISH_BUILD_RESULT: ${{ needs.publish_build.result }}
          DOCS_ONLY: ${{ needs.scope.outputs.docs_only }}
        shell: bash
        run: |
          echo "scope=${SCOPE_RESULT} checks=${CHECKS_RESULT} test=${TEST_RESULT} publish_build=${PUBLISH_BUILD_RESULT} docs_only=${DOCS_ONLY}"
          rc=0
          # scope and checks must genuinely succeed — never accept a bare
          # "skipped" for them. If scope errors (checkout / changed-scope),
          # GitHub *skips* checks+test as its dependents; accepting "skipped"
          # would let the required check go green without checkout, lint, build,
          # or tests ever running. `checks` has no `if:`, so it only skips when
          # scope didn't succeed — require success outright.
          for r in "${SCOPE_RESULT}" "${CHECKS_RESULT}"; do
            case "$r" in
              success) ;;
              *) echo "::error::required upstream job concluded '$r' (expected success)"; rc=1 ;;
            esac
          done
          # test may legitimately be "skipped" — but ONLY via its
          # `if: docs_only != 'true'` docs-only path. Gate that explicitly on
          # docs_only rather than inferring it from scope==success: a skipped
          # test is accepted only when this really is a docs-only PR, so any
          # other skip (a future `if:` on the test job, a dependency cascade)
          # fails the required check instead of silently passing.
          case "${TEST_RESULT}" in
            success) ;;
            skipped)
              if [ "${DOCS_ONLY}" != "true" ]; then
                echo "::error::test matrix was skipped but this is not a docs-only PR (docs_only=${DOCS_ONLY})"
                rc=1
              fi
              ;;
            *) echo "::error::the test matrix concluded '${TEST_RESULT}'"; rc=1 ;;
          esac

          # publish_build runs the per-package publish build for every published
          # workspace package. Like the test matrix it may legitimately be
          # "skipped" ONLY via its `if: docs_only != 'true'` docs-only path; any
          # other skip fails the required check instead of silently passing.
          case "${PUBLISH_BUILD_RESULT}" in
            success) ;;
            skipped)
              if [ "${DOCS_ONLY}" != "true" ]; then
                echo "::error::publish_build was skipped but this is not a docs-only PR (docs_only=${DOCS_ONLY})"
                rc=1
              fi
              ;;
            *) echo "::error::publish_build concluded '${PUBLISH_BUILD_RESULT}'"; rc=1 ;;
          esac

          if [ "$rc" -eq 0 ]; then
            echo "All required CI jobs passed (test + publish build skipped only on docs-only PRs)."
          fi
          exit "$rc"
