name: 'use-vibes-publish'
on:
  push:
    paths:
      - 'use-vibes/**/*'
    tags:
      - 'use-vibes@*'

jobs:
  compile_test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ startsWith(github.ref, 'refs/tags/core@s') && 'staging' || startsWith(github.ref, 'refs/tags/core@p') && 'production' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./actions/runtime

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: install
        shell: bash
        run: pnpm install

      - name: deno-cli-check
        shell: bash
        run: deno task --config use-vibes/pkg/deno.json check-cli

      - name: deno-cli-test
        shell: bash
        run: deno task --config use-vibes/pkg/deno.json test-cli

      - name: format-check
        shell: bash
        run: pnpm run format --check

      - name: lint-published-packages
        shell: bash
        run: pnpm exec eslint prompts/pkg call-ai/pkg use-vibes/types use-vibes/base use-vibes/pkg

      - name: validate-published-packages
        shell: bash
        run: |
          set -e
          echo "Building packages in publish order..."
          pnpm --filter @vibes.diy/prompts build
          pnpm --filter call-ai build
          pnpm --filter @vibes.diy/use-vibes-types build
          pnpm --filter @vibes.diy/use-vibes-base build
          pnpm --filter use-vibes build
          echo "✅ All published packages validated"

      - uses: ./use-vibes/actions/publish
        with:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
