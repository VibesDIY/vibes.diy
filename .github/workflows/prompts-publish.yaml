name: 'prompts-publish'
on:
  push:
    paths:
      - 'prompts/**/*'
    tags:
      - 'prompts@*'

jobs:
  # Named `publish` (not `compile_test`): this job SKIPS the test suite
  # (`pnpm run lint || true`, no tests), so it must not emit a `compile_test`
  # check — the deploy/CI green-SHA reuse path keys on that exact name to mean
  # "the real suite passed." See VibesDIY/vibes.diy#2790.
  publish:
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/core@s') && 'staging' || startsWith(github.ref, 'refs/tags/core@p') && 'production' || 'dev' }}
    steps:
      - uses: actions/checkout@v5

      - uses: ./actions/runtime

      - name: install
        shell: bash
        run: pnpm install

      - name: format-check
        shell: bash
        run: pnpm run format:check

      - name: lint
        shell: bash
        run: |
          echo "We NEED to work on the linting"
          pnpm run lint || true

      - name: validate-all-packages
        shell: bash
        run: |
          set -e
          echo "Running root validation before publishing (SKIPPING TESTS)..."
          pnpm build
          echo "✅ All packages validated successfully (tests skipped)"

      - uses: ./prompts/actions/publish
        with:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
