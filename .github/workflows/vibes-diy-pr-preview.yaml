name: 'Deploy vibes.diy PR Preview'

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'vibes.diy/**/*'
      - '.github/workflows/vibes-diy-pr-preview.yaml'

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup runtime environment
        uses: ./actions/runtime

      - name: Install dependencies
        run: pnpm install

      - name: Set PR info
        id: pr
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          WORKER_NAME="pr-${PR_NUMBER}-vibes-diy-v2"
          # Builder SPA + API stay on the workers.dev URL (Clerk allowed-origins
          # unchanged). The vibe iframe + /vibe-pkg/ move to a per-PR base on a
          # separate zone so the iframe is served by THIS PR's worker and stays
          # cross-origin from the builder, matching prod's isolation.
          PREVIEW_URL="https://${WORKER_NAME}.jchris.workers.dev"
          PREVIEW_HOST="pr-${PR_NUMBER}.vibespreview.dev"
          echo "number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "worker_name=${WORKER_NAME}" >> $GITHUB_OUTPUT
          echo "preview_url=${PREVIEW_URL}" >> $GITHUB_OUTPUT
          echo "preview_host=${PREVIEW_HOST}" >> $GITHUB_OUTPUT

      - name: Ensure preview DNS + TLS
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ vars.CLOUDFLARE_VIBESPREVIEW_ZONE_ID }}
          PREVIEW_HOST: ${{ steps.pr.outputs.preview_host }}
        run: |
          set -euo pipefail
          if [ -z "${CF_ZONE_ID:-}" ]; then
            echo "::error::CLOUDFLARE_VIBESPREVIEW_ZONE_ID repo var is unset — the vibespreview.dev zone + ACM prerequisites must be provisioned before PR previews can deploy (see vibes.diy/pkg/wrangler.toml [env.preview] and the PR-preview plan)."
            exit 1
          fi
          # Capture HTTP code + body separately so failures surface the
          # actual CF error JSON (the previous pipe-to-/dev/null swallowed
          # 4xx bodies and exited silently). Returns body on stdout when
          # the call succeeded (HTTP < 400 and `.success != false`),
          # echoes the response to stderr and returns 1 otherwise — so
          # `set -euo pipefail` trips with an actionable message.
          api() {
            local tmp http
            tmp=$(mktemp)
            http=$(curl -sS -o "$tmp" -w '%{http_code}' \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" "$@")
            if [ "$http" -ge 400 ] || [ "$(jq -r '.success // true' "$tmp" 2>/dev/null)" = "false" ]; then
              echo "::error::CF API $* failed (HTTP $http): $(cat "$tmp")" >&2
              rm -f "$tmp"
              return 1
            fi
            cat "$tmp"
            rm -f "$tmp"
          }

          # Proxied DNS for the per-PR deep wildcard (covers
          # <app>--<user>.pr-<N>.vibespreview.dev and assets.pr-<N>...).
          # The per-PR apex `pr-<N>.vibespreview.dev` is covered by the
          # zone-wide static `*.vibespreview.dev` record provisioned once
          # by hand (DNS wildcards match exactly one label and don't
          # recurse, so the deep wildcard still needs its own record).
          # 100:: is the conventional "proxied-only, no real origin" target.
          NAME="*.${PREVIEW_HOST}"
          EXISTING=$(api "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=AAAA&name=${NAME}" | jq -r '.result[0].id // empty')
          if [ -z "$EXISTING" ]; then
            api -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
              --data "{\"type\":\"AAAA\",\"name\":\"${NAME}\",\"content\":\"100::\",\"proxied\":true}" > /dev/null
            echo "Created DNS record ${NAME}"
          else
            echo "DNS record ${NAME} already exists (${EXISTING})"
          fi

          # ACM advanced certificate covering the third-level wildcard
          # (*.pr-<N>.vibespreview.dev) — free Universal SSL doesn't. Flat
          # $10/mo per zone; one cert pack slot per open PR. DNS-validated
          # automatically since the zone is on Cloudflare.
          HAVE_CERT=$(api "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/ssl/certificate_packs?status=all" \
            | jq -r --arg h "${PREVIEW_HOST}" '[.result[] | select(.type=="advanced") | select((.hosts // []) | index($h))] | length')
          if [ "${HAVE_CERT:-0}" -eq 0 ]; then
            api -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/ssl/certificate_packs/order" \
              --data "{\"type\":\"advanced\",\"hosts\":[\"${PREVIEW_HOST}\",\"*.${PREVIEW_HOST}\"],\"validation_method\":\"txt\",\"validity_days\":90,\"certificate_authority\":\"google\",\"cloudflare_branding\":false}" \
              > /dev/null
            echo "Ordered ACM advanced cert for ${PREVIEW_HOST}"
          else
            echo "ACM advanced cert for ${PREVIEW_HOST} already exists"
          fi

      - name: Build and deploy preview
        working-directory: vibes.diy/pkg
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUD_SESSION_TOKEN_PUBLIC: ${{ vars.CLOUD_SESSION_TOKEN_PUBLIC }}
          CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
          DEVICE_ID_CA_PRIV_KEY: ${{ secrets.DEVICE_ID_CA_PRIV_KEY }}
          DEVICE_ID_CA_CERT: ${{ vars.DEVICE_ID_CA_CERT }}
          FP_VERSION: ${{ vars.FP_VERSION }}
          FPCLOUD_URL: ${{ vars.FPCLOUD_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VIBES_DIY_PUBLIC_BASE_URL: ${{ steps.pr.outputs.preview_url }}
          CLOUD_SESSION_TOKEN_SECRET: ${{ secrets.CLOUD_SESSION_TOKEN_SECRET }}
          CLOUD_SESSION_TOKEN_ISSUER: ${{ vars.CLOUD_SESSION_TOKEN_ISSUER }}
          VIBES_DIY_FROM_EMAIL: ${{ vars.VIBES_DIY_FROM_EMAIL }}
          # Iframe entry-point + /vibe-pkg/ are served by THIS PR's worker on
          # its per-PR base (not the merged dev worker); cache-bust the package
          # URL per deploy like prod/cli/dev do (actions/deploy/action.yaml).
          VIBES_SVC_HOSTNAME_BASE: ${{ steps.pr.outputs.preview_host }}
          VIBES_SVC_PROTOCOL: https
          LLM_BACKEND_API_KEY: ${{ secrets.LLM_BACKEND_API_KEY }}
          LLM_BACKEND_URL: ${{ vars.LLM_BACKEND_URL }}
          CLERK_PUB_JWT_URL: ${{ vars.CLERK_PUB_JWT_URL }}
          DB_FLAVOUR: ${{ vars.DB_FLAVOUR }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          MAX_APP_SLUG_PER_USER_ID: ${{ vars.MAX_APP_SLUG_PER_USER_ID }}
          WORKSPACE_NPM_URL: https://${{ steps.pr.outputs.preview_host }}/vibe-pkg/?v=${{ github.sha }}
          VIBES_DIY_API_URL: ${{ steps.pr.outputs.preview_url }}/api
          WORKER_NAME: ${{ steps.pr.outputs.worker_name }}
          PREVIEW_HOST: ${{ steps.pr.outputs.preview_host }}
        run: |
          set -e

          # Build using preview env (no routes, workers.dev only)
          CLOUDFLARE_ENV=preview pnpm exec react-router build

          # No migrations — merge to main for schema changes

          # Set secrets on the preview worker
          pnpm exec core-cli writeEnv --out - --json \
            --fromEnv CLOUD_SESSION_TOKEN_PUBLIC \
            --fromEnv CLERK_PUBLISHABLE_KEY \
            --fromEnv DEVICE_ID_CA_PRIV_KEY \
            --fromEnv DEVICE_ID_CA_CERT \
            --fromEnv FP_VERSION \
            --fromEnv FPCLOUD_URL \
            --fromEnv RESEND_API_KEY \
            --fromEnv VIBES_DIY_PUBLIC_BASE_URL \
            --fromEnv CLOUD_SESSION_TOKEN_SECRET \
            --fromEnv CLOUD_SESSION_TOKEN_ISSUER \
            --fromEnv VIBES_DIY_FROM_EMAIL \
            --fromEnv VIBES_SVC_HOSTNAME_BASE \
            --fromEnv VIBES_SVC_PROTOCOL \
            --fromEnv LLM_BACKEND_API_KEY \
            --fromEnv LLM_BACKEND_URL \
            --fromEnv CLERK_PUB_JWT_URL \
            --fromEnv DB_FLAVOUR \
            --fromEnv NEON_DATABASE_URL \
            --fromEnv MAX_APP_SLUG_PER_USER_ID \
            --fromEnv WORKSPACE_NPM_URL \
            --fromEnv VIBES_DIY_API_URL | \
            pnpm exec wrangler secret --name $WORKER_NAME bulk

          # Deploy with custom worker name + per-PR vibespreview.dev routes.
          # [env.preview] keeps workers_dev=true (builder/API URL); CLI --route
          # overrides the (empty) config routes, so the worker also answers on
          # pr-<N>.vibespreview.dev and *.pr-<N>.vibespreview.dev.
          pnpm exec wrangler deploy --env preview --name "$WORKER_NAME" \
            --route "${PREVIEW_HOST}/*" \
            --route "*.${PREVIEW_HOST}/*"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            const previewUrl = '${{ steps.pr.outputs.preview_url }}';
            const previewHost = '${{ steps.pr.outputs.preview_host }}';
            const workerName = '${{ steps.pr.outputs.worker_name }}';
            const sha = context.sha.substring(0, 7);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('<!-- vibes-diy-preview -->')
            );

            const commentBody = `<!-- vibes-diy-preview -->
            ## Preview Deployment

            **Preview URL:** ${previewUrl}
            **Vibe iframes / packages:** \`https://<app>--<user>.${previewHost}/…\` (served by this PR's worker)
            **Worker:** \`${workerName}\`
            **Commit:** ${sha}

            ---
            <sub>Updated on each push to this PR. Worker, routes, DNS records and TLS cert are deleted when the PR closes.</sub>`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody,
              });
            }
