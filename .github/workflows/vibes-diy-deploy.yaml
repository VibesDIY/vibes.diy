name: 'deploy vibes.diy'
on:
  push:
    paths:
      - 'vibes.diy/**/*'

    tags:
      - 'vibes-diy@*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true

# Why this is split into gate → (checks ‖ test shards) → compile_test → deploy
# instead of one job: a deploy off a SHA with no green compile_test check (a
# fresh prod tag, a rebased main commit) used to run the full ~4-min suite
# serially inside actions/base before deploying. That suite is the same one
# ci.yaml now shards, so fan it out here too across free standard runners
# (public repo → unlimited + concurrent).
#
#   gate        — does this SHA already have a green compile_test check? (the old
#                 skip-tests-if-sha-green optimization, hoisted to job level so a
#                 green SHA skips the WHOLE matrix + checks, not just one step).
#   checks      — lint + format-check + build(typecheck); ALWAYS runs (cheap
#                 blocking backstop, kept even on a green SHA — see its comment).
#   test        — the Docker vitest suite, fanned across 4 shards, when not green.
#   compile_test — aggregator that KEEPS this exact job name so it still emits a
#                 reusable green `compile_test` check on the deploy SHA: that's
#                 what lets a second same-SHA deploy (@p after @c, etc.) reuse the
#                 result via gate. Green iff SHA-already-green OR checks+test both
#                 passed — so a red suite (or lint/build) can never reach deploy.
#   deploy      — the Cloudflare deploy; runs only on a green compile_test.
jobs:
  gate:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    # checks: read lets the lookup below see whether this SHA already has a green
    # compile_test check. No checkout / contents needed here.
    permissions:
      checks: read
    outputs:
      sha_green: ${{ steps.check.outputs.sha_green }}
    steps:
      - name: check-sha-tested
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          # Same green-check lookup actions/base used for skip-tests-if-sha-green,
          # at job level so a green SHA skips the whole matrix. Fail safe: any API
          # hiccup → sha_green=false → the full checks + sharded suite runs, so
          # coverage is never silently dropped.
          GREEN=$(gh api "repos/${REPO}/commits/${SHA}/check-runs" --paginate \
            --jq '[.check_runs[] | select(.name=="compile_test" and .conclusion=="success")] | length' \
            2>/dev/null | awk '{s+=$1} END {print s+0}')
          if [ "${GREEN:-0}" -ge 1 ]; then
            echo "sha_green=true" >> "$GITHUB_OUTPUT"
            echo "✅ ${SHA} already has a green compile_test check — skipping checks + tests." \
              >> "${GITHUB_STEP_SUMMARY:-/dev/stdout}"
          else
            echo "sha_green=false" >> "$GITHUB_OUTPUT"
            echo "No green compile_test check on ${SHA} — running checks + sharded tests."
          fi

  # Lint + format-check + build(typecheck) gate — the non-test half of what
  # actions/base ran before the deploy. Runs ALWAYS (even on an already-green
  # SHA), deliberately: it's the cheap blocking backstop that the old deploy
  # kept regardless of skip-tests-if-sha-green. The green-check lookup matches
  # any check named `compile_test`, and other publish workflows
  # (use-vibes-publish / prompts-publish) emit one WITHOUT running tests — so a
  # cross-stream same-SHA tag could set sha_green=true off a check that never
  # ran the suite. Skipping only the (re-runnable, sharded) test matrix on that
  # signal — never lint/build — keeps a misleading match from removing the
  # backstop. See #2790 for retiring that name collision at the source (which
  # would then let this job also skip on a genuinely-green SHA).
  # `run-tests: 'false'` skips the Docker suite here.
  checks:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./actions/base
        with:
          run-tests: 'false'

  # The Docker Playwright/vitest suite, fanned out across free standard runners,
  # only when the SHA isn't already green. fail-fast: false for the full picture.
  test:
    needs: gate
    if: ${{ needs.gate.outputs.sha_green != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5
      - uses: ./actions/base
        with:
          run-checks: 'false'
          shard: ${{ matrix.shard }}/4
          artifact-suffix: -shard-${{ matrix.shard }}

  # Aggregator. Keeps the name `compile_test` so it still emits a reusable green
  # check on the deploy SHA (same-SHA deploy reuse via gate) and so the meaning
  # of a green compile_test on a SHA is unchanged. Green iff the SHA was already
  # green OR checks + every test shard passed; fails the deploy otherwise.
  compile_test:
    needs: [gate, checks, test]
    if: ${{ always() && !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: gate
        env:
          GATE_RESULT: ${{ needs.gate.result }}
          CHECKS_RESULT: ${{ needs.checks.result }}
          TEST_RESULT: ${{ needs.test.result }}
          SHA_GREEN: ${{ needs.gate.outputs.sha_green }}
        shell: bash
        run: |
          echo "gate=${GATE_RESULT} checks=${CHECKS_RESULT} test=${TEST_RESULT} sha_green=${SHA_GREEN}"
          rc=0
          # gate must have run so sha_green is trustworthy, and checks (lint +
          # build) ALWAYS runs — it's the backstop kept even on a green SHA,
          # because the green-check lookup isn't workflow-scoped (see the checks
          # job comment). Both must succeed.
          for r in "${GATE_RESULT}" "${CHECKS_RESULT}"; do
            case "$r" in
              success) ;;
              *) echo "::error::required job concluded '$r' (expected success)"; rc=1 ;;
            esac
          done
          # The test matrix is skipped only on an already-green SHA; otherwise the
          # full sharded suite must have passed.
          if [ "${SHA_GREEN}" = "true" ]; then
            echo "SHA already green — test suite reused (lint/build still ran)."
          else
            case "${TEST_RESULT}" in
              success) ;;
              *) echo "::error::test matrix concluded '${TEST_RESULT}' (expected success)"; rc=1 ;;
            esac
          fi
          if [ "$rc" -eq 0 ]; then
            echo "gate green — deploy may proceed."
          fi
          exit "$rc"

  # The actual Cloudflare deploy. Carries the per-tag environment + all secrets.
  # Gate explicitly on compile_test's *result*, not the implicit success(): on
  # the green-SHA reuse path compile_test runs via always() with skipped
  # checks/test ancestors, and GitHub propagates that upstream skip through the
  # default success() gate — skipping the deploy even though compile_test itself
  # concluded success. `always() && needs.compile_test.result == 'success'`
  # deploys whenever the aggregator went green regardless of how the skipped
  # ancestors propagate, and still blocks on a red/failed/[skip ci] compile_test.
  # This job just needs install (the deploy action does its own build +
  # wrangler); lint/build/test already gated above.
  deploy:
    needs: compile_test
    if: ${{ always() && needs.compile_test.result == 'success' }}
    runs-on: ubuntu-latest
    # @c (cli) tags used to run in a separate `deploy_cli` job, but the body was
    # identical — the only real difference is the environment (the cli-vs-prod
    # divergence, e.g. the queue consumer, lives in vibes.diy/actions/deploy
    # gated on CLOUDFLARE_ENV). So @c folds into the ternary below instead of
    # duplicating the whole job. See agents/deploy-tags.md.
    environment: ${{ startsWith(github.ref, 'refs/tags/vibes-diy@s') && 'staging' || startsWith(github.ref, 'refs/tags/vibes-diy@p') && 'prodv2' || startsWith(github.ref, 'refs/tags/vibes-diy@c') && 'cli' || 'dev' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: ./actions/base
        with:
          run-checks: 'false'
          run-tests: 'false'

      - uses: ./vibes.diy/actions/deploy
        with:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ENV: ${{ vars.CLOUDFLARE_ENV }}
          CLOUD_SESSION_TOKEN_PUBLIC: ${{ vars.CLOUD_SESSION_TOKEN_PUBLIC }}
          CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
          DEVICE_ID_CA_PRIV_KEY: ${{ secrets.DEVICE_ID_CA_PRIV_KEY }}
          DEVICE_ID_CA_CERT: ${{ vars.DEVICE_ID_CA_CERT }}
          FP_VERSION: ${{ vars.FP_VERSION }}
          FPCLOUD_URL: ${{ vars.FPCLOUD_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VIBES_DIY_PUBLIC_BASE_URL: ${{ vars.VIBES_DIY_PUBLIC_BASE_URL }}
          CLOUD_SESSION_TOKEN_SECRET: ${{ secrets.CLOUD_SESSION_TOKEN_SECRET }}
          CLOUD_SESSION_TOKEN_ISSUER: ${{ vars.CLOUD_SESSION_TOKEN_ISSUER }}
          VIBES_DIY_FROM_EMAIL: ${{ vars.VIBES_DIY_FROM_EMAIL }}
          VIBES_SVC_HOSTNAME_BASE: ${{ vars.VIBES_SVC_HOSTNAME_BASE }}
          VIBES_SVC_PROTOCOL: ${{ vars.VIBES_SVC_PROTOCOL }}
          LLM_BACKEND_API_KEY: ${{ secrets.LLM_BACKEND_API_KEY }}
          LLM_BACKEND_URL: ${{ vars.LLM_BACKEND_URL }}
          CLERK_PUB_JWT_URL: ${{ vars.CLERK_PUB_JWT_URL }}
          DB_FLAVOUR: ${{ vars.DB_FLAVOUR }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          NEON_DATABASE_ADMIN_URL: ${{ secrets.NEON_DATABASE_ADMIN_URL }}
          MAX_APP_SLUG_PER_USER_ID: ${{ vars.MAX_APP_SLUG_PER_USER_ID }}
          WORKSPACE_NPM_URL: ${{ vars.WORKSPACE_NPM_URL }}
          VIBES_DIY_API_URL: ${{ vars.VIBES_DIY_API_URL }}
          PRODIA_TOKEN: ${{ secrets.PRODIA_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          META_CAPI_TOKEN: ${{ secrets.META_CAPI_TOKEN }}
          META_PIXEL_ID: ${{ vars.META_PIXEL_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ vars.META_AD_ACCOUNT_ID }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
          POSTHOG_KEY: ${{ vars.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
