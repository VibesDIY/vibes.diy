name: Deploy good.vibes.diy (landing-pages)

# Builds the static good.vibes.diy site (the SSG under landing-pages/) and
# deploys it to the Cloudflare Pages project `landing-pages` — same project +
# Cloudflare account the monorepo already deploys to. Path-scoped so unrelated
# monorepo commits don't redeploy.
#
# Two jobs:
#   build  — runs on every PR + push touching landing-pages/**. This is the
#            anti-wedge gate: a broken build (missing homepage / blog / feeds)
#            fails here and never reaches good.vibes.diy. Needs no secrets.
#   deploy — push-to-main + manual dispatch only. Declares `environment:
#            production` so the Cloudflare secrets (which live on that GitHub
#            Environment, same as the failback-homepage deploy) resolve, then
#            ships _site to the `landing-pages` Pages project.
#
# Note: PR-preview deploys are intentionally not wired here — that needs a
# GitHub Environment exposing the Cloudflare token to pull_request runs, which
# is an infra decision. The build gate already verifies every PR.

on:
  push:
    branches:
      - main
    paths:
      - 'landing-pages/**'
  pull_request:
    paths:
      - 'landing-pages/**'
  workflow_dispatch:

concurrency:
  # One in-flight deploy per ref so the two repos / multiple runs never fight
  # over the same Pages project.
  group: landing-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup runtime environment
        uses: ./actions/runtime

      # landing-pages/ is intentionally NOT a pnpm workspace member, so install
      # it standalone — --ignore-workspace stops the monorepo root from claiming
      # it.
      - name: Install landing-pages dependencies
        run: |
          cd landing-pages
          pnpm install --ignore-workspace

      # Anti-wedge gate: this must pass before anything can touch the live site.
      - name: Build site
        run: |
          cd landing-pages
          pnpm build
          test -f _site/index.html
          test -f _site/blog/index.html
          test -f _site/blog/feed.xml
          test -f _site/blog/rss.xml

  deploy:
    needs: build
    # Production deploy only — never on PRs (the build job is the PR gate).
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    # Resolves the Cloudflare secrets attached to this GitHub Environment, the
    # same way the failback-homepage Pages deploy does.
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup runtime environment
        uses: ./actions/runtime

      - name: Install landing-pages dependencies
        run: |
          cd landing-pages
          pnpm install --ignore-workspace

      - name: Build site
        run: |
          cd landing-pages
          pnpm build

      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd landing-pages
          echo "🚀 Deploying to production (good.vibes.diy)..."
          for attempt in 1 2 3; do
            npx wrangler pages deploy _site --project-name=landing-pages && break
            if [ "$attempt" -eq 3 ]; then echo "wrangler pages deploy failed after 3 attempts"; exit 1; fi
            echo "wrangler pages deploy attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          echo "✅ Deployment complete!"
