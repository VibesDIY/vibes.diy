name = "vibes-diy-v2"
main = "./workers/app.ts"
compatibility_date = "2025-02-24"
compatibility_flags = ["nodejs_compat"]

vars = { ENVIRONMENT = "test" }

#[observability.logs]
#enabled = true

[assets]
directory = "build/client"
binding = "ASSETS"

[browser]
binding = "BROWSER"

[durable_objects]
bindings = [{ name = "CHAT_SESSIONS", class_name = "ChatSessions" }]

[[migrations]]
tag = "v1"
new_classes = ["ChatSessions"]

[[d1_databases]]
binding = "DB"
database_name = "dev-vibes-diy-v2"
database_id = "105530de-9900-435b-92f4-15347af604f6"

[[r2_buckets]]
binding = "FS_IDS_BUCKET"
bucket_name = "vibes-diy-fs-ids"

[[queues.producers]]
queue = "vibes-service"
binding = "VIBES_SERVICE"

[env.local]
name = "vibes-diy-v2-local"
vars = { ENVIRONMENT = "local" }
routes = [
  { pattern = "localhost.vibesdiy.net/*", zone_name = "vibesdiy.net" },
  { pattern = "*.localhost.vibesdiy.net/*", zone_name = "vibesdiy.net" }
]

[env.local.browser]
binding = "BROWSER"

[env.local.durable_objects]
bindings = [{ name = "CHAT_SESSIONS", class_name = "ChatSessions" }]

[[env.local.migrations]]
tag = "v1"
new_classes = ["ChatSessions"]

[[env.local.d1_databases]]
binding = "DB"
database_name = "dev-vibes-diy-v2"
database_id = "105530de-9900-435b-92f4-15347af604f6"

[[env.local.r2_buckets]]
binding = "FS_IDS_BUCKET"
bucket_name = "vibes-diy-fs-ids"

[[env.local.queues.producers]]
queue = "vibes-service-local"
binding = "VIBES_SERVICE"

[env.dev]
name = "vibes-diy-v2-dev"
vars = { ENVIRONMENT = "dev" }
routes = [
  { pattern = "dev-v2.vibesdiy.net/*", zone_name = "vibesdiy.net" },
  { pattern = "*.dev-v2.vibesdiy.net/*", zone_name = "vibesdiy.net" }
]

[env.dev.observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true

[env.dev.browser]
binding = "BROWSER"

[env.dev.durable_objects]
bindings = [{ name = "CHAT_SESSIONS", class_name = "ChatSessions" }]

[[env.dev.migrations]]
tag = "v1"
new_classes = ["ChatSessions"]

[[env.dev.d1_databases]]
binding = "DB"
database_name = "dev-vibes-diy-v2"
database_id = "105530de-9900-435b-92f4-15347af604f6"

[[env.dev.r2_buckets]]
binding = "FS_IDS_BUCKET"
bucket_name = "vibes-diy-fs-ids"

[[env.dev.queues.producers]]
queue = "vibes-service-dev"
binding = "VIBES_SERVICE"

[env.prod]
name = "vibes-diy-v2-prod"
vars = { ENVIRONMENT = "prod" }
routes = [
  { pattern = "prod-v2.vibesdiy.net", zone_name = "vibesdiy.net" },
