head_sampling_rate = 1
invocation_logs = true
persist = true

[env.cli.browser]
binding = "BROWSER"

# cli keeps its own ChatSessions (per-env fan-out, scale isolation, future
# divergence anchor for cli-specific prompts/rate-limits/auth). The
# cross-script DOC_NOTIFY binding was removed as part of DocNotify
# retirement (#2265) — DocNotify is dead code (live fan-out now runs through
# per-vibe localBroadcastCallbacks, see #2253), so cli no longer references
# prod's class. This Step B deploy also deletes cli's dormant local DocNotify
# class via the cli `v6 deleted_classes` migration below (required because the
# DocNotify source is removed in this PR). Deploy order is still cli BEFORE
# prod, so prod's class loses its last reference before prod deletes it.
[env.cli.durable_objects]
bindings = [
  # #2714 Spec B Phase E: cli's local CHAT_SESSIONS binding + class are deleted
  # (v10 deleted_classes); codegen now runs on the local CODEGEN_SESSIONS handle.
  # #2714 Spec B Phase E (cli-first unbind, PR-E1): the cross-script APP_SESSIONS
  # + SHARED_SESSIONS bindings are removed here so prod can later `deleted_classes`
  # those classes without a 10061 (the validator counts a cross-script binding's
  # class_name as a live reference). This cli deploy MUST go live BEFORE prod's
  # deletion deploy (PR-E2) — the REVERSE of the usual prod-before-cli. vibe/shared
  # traffic already routes to SESSIONS (Phase C); these bindings are dead. The
  # cross-script USER_NOTIFY binding stays (UserNotify is not part of the collapse).
  { name = "USER_NOTIFY", class_name = "UserNotify", script_name = "vibes-diy-v2-prod" },
  # v9 (#2714 Spec B): SESSIONS cross-script→prod (vibe+shared share the prod data
  # plane); CODEGEN_SESSIONS local (codegen isolated per-env). The SAME class name
  # "Sessions" appears both local and cross-script — disambiguated by script_name.
  { name = "SESSIONS", class_name = "Sessions", script_name = "vibes-diy-v2-prod" },
  { name = "CODEGEN_SESSIONS", class_name = "Sessions" },
  # Per-app backend.js (#2856 B3): local on cli (no cross-script), so cli runs its
  # own BackendDO with no prod-before-cli ordering dependency.
  { name = "BACKEND_DO", class_name = "BackendDO" },
]

[[env.cli.migrations]]
tag = "v1"
new_classes = ["ChatSessions"]

# v2 is historical and must stay: cli originally declared its own local
# DocNotify class, the live worker has v2 applied, and wrangler refuses
# to deploy when a live tag is missing from config (10074 — tries to
# reset+reapply and trips on existing classes).
#
# The cross-script DOC_NOTIFY binding was removed in #2297. Keep this
# historical `v2 new_classes=["DocNotify"]` entry — wrangler refuses to
# deploy when a previously-applied tag is missing from config. The dormant
# class itself is deleted by the cli `v6 deleted_classes` migration below:
# now that this Step B deploy removes the DocNotify source, the cli worker no
# longer exports the class, so the registry entry must be retired in the same
# deploy (otherwise Cloudflare rejects the worker for a missing DO class).
[[env.cli.migrations]]
tag = "v2"
new_classes = ["DocNotify"]

# v3: UserNotify is cross-script-bound to vibes-diy-v2-prod (same pattern as
# DocNotify). The local class registry entry stays dormant for the same reason.
[[env.cli.migrations]]
tag = "v3"
new_classes = ["UserNotify"]

[[env.cli.migrations]]
tag = "v4"
new_classes = ["AccessFnDO"]

[[env.cli.migrations]]
tag = "v5"
new_classes = ["AppSessions"]

# v6: retire cli's dormant local DocNotify class. Safe now that #2297 removed
# the cross-script DOC_NOTIFY binding (no 10061), and required because this
# Step B deploy deletes the DocNotify source so the worker no longer exports
# the class. (#2265)
[[env.cli.migrations]]
tag = "v6"
deleted_classes = ["DocNotify"]

# v7: AccessFnDO retired. cli's AccessFnDO is a LOCAL class (v4 new_classes; the
# binding had no script_name), so deleting it here has no cross-script 10061
# dependency on prod — unlike DocNotify. (#2265)
[[env.cli.migrations]]
tag = "v7"
deleted_classes = ["AccessFnDO"]

# v8: SharedSessions — cross-script (prod). Deploy prod before cli so the class
# exists in prod before cli's cross-script binding is applied (same 10061 ordering
# as APP_SESSIONS/USER_NOTIFY). (#2265 Track B)
[[env.cli.migrations]]
tag = "v8"
new_classes = ["SharedSessions"]

# v9: cli's LOCAL Sessions class (codegen plane, via CODEGEN_SESSIONS). The
# cross-script SESSIONS binding references prod's Sessions — same class name,
# disambiguated by script_name. Deploy AFTER prod's v9 (cross-script needs prod's
# class first; same 10061 ordering as APP_SESSIONS/SHARED_SESSIONS). (#2714 Spec B)
[[env.cli.migrations]]
tag = "v9"
new_classes = ["Sessions"]

# v10: retire old session classes — see top-level v10. (#2714 Spec B Phase E)
[[env.cli.migrations]]
tag = "v10"
deleted_classes = ["ChatSessions", "AppSessions", "SharedSessions"]

# v11: BackendDO — per-app backend.js runtime (#2856 B3). cli runs a LOCAL BackendDO
# (no cross-script binding), so no prod-before-cli ordering dependency.
[[env.cli.migrations]]
tag = "v11"
new_classes = ["BackendDO"]

[[env.cli.d1_databases]]
binding = "DB"
database_name = "prod-vibes-diy-v2"
database_id = "0f783eae-91cf-49c4-a706-6e4d2498cb4a"

[[env.cli.r2_buckets]]
