[env.prod.durable_objects]
bindings = [{ name = "CHAT_SESSIONS", class_name = "ChatSessions" }]

[[env.prod.migrations]]
tag = "v1"
new_classes = ["ChatSessions"]

[[env.prod.d1_databases]]
