name = "vibes-diy-v2"
main = "./workers/app.ts"
compatibility_date = "2025-02-24"
compatibility_flags = ["nodejs_compat"]

vars = { ENVIRONMENT = "test" }

#[observability.logs]
#enabled = true

[assets]
directory = "build/client"
binding = "ASSETS"

[browser]
binding = "BROWSER"

[durable_objects]
bindings = [
  # #2714 Spec B: unified Sessions class. SESSIONS = vibe + shared planes,
  # CODEGEN_SESSIONS = codegen plane (both bind class "Sessions", local here). The
  # old CHAT_/APP_/SHARED_SESSIONS local bindings + classes were deleted in Phase E
  # (v10 deleted_classes) after the drain confirmed zero traffic (#2778).
  { name = "SESSIONS", class_name = "Sessions" },
  { name = "CODEGEN_SESSIONS", class_name = "Sessions" },
  { name = "USER_NOTIFY", class_name = "UserNotify" },
  # Per-app backend.js (#2856 B3): per-vibe backend Durable Object. Local class in
  # every env (no cross-script) so there's no 10061 ordering trap; traffic stays
  # gated behind BACKEND_JS until B8.
  { name = "BACKEND_DO", class_name = "BackendDO" },
]

[[migrations]]
tag = "v1"
new_classes = ["ChatSessions"]

[[migrations]]
tag = "v2"
new_classes = ["DocNotify"]

[[migrations]]
tag = "v3"
new_classes = ["UserNotify"]

[[migrations]]
tag = "v4"
new_classes = ["AccessFnDO"]

[[migrations]]
tag = "v5"
new_classes = ["AppSessions"]

# v6: DocNotify is dead code (live fan-out moved to per-vibe
# localBroadcastCallbacks in #2253). Class deleted here; cli dropped its
# cross-script binding first (#2297) to clear the 10061 blocker. (#2265)
[[migrations]]
tag = "v6"
deleted_classes = ["DocNotify"]

# v7: AccessFnDO retired — access-fn eval runs locally on the DOs (AppSessions +
# ChatSessions localInvokeAccessFn); no code references env.ACCESS_FN_DO after
# #2265 A2b. Local binding in every env (no cross-script script_name), so unlike
# DocNotify there's no 10061 ordering trap — one PR, prod before cli. (#2265)
[[migrations]]
tag = "v7"
deleted_classes = ["AccessFnDO"]

# v8: SharedSessions — lightweight non-vibe-plane DO serving sharedHandlers only.
# Deploy prod before cli (cli's cross-script binding requires the prod class first,
# same ordering as APP_SESSIONS/USER_NOTIFY). (#2265 Track B)
[[migrations]]
tag = "v8"
new_classes = ["SharedSessions"]

# v9: unified Sessions class (#2714 Spec B physical collapse). Adds the class;
# bindings SESSIONS + CODEGEN_SESSIONS route the three planes to it. The old
# ChatSessions/AppSessions/SharedSessions stay (drained, GC'd in a later deploy).
# Deploy prod BEFORE cli (cli cross-script-binds SESSIONS→prod, so prod's class
# must exist first — same ordering as v8/v5).
[[migrations]]
tag = "v9"
new_classes = ["Sessions"]

# v10: retire the old session classes (#2714 Spec B Phase E). Drained per #2778
# (old-class invocations a positive zero since the v9/2.6.13 deploy). IRREVERSIBLE
# — destroys all instances/state for these classes; safe only because they hold no
# durable storage (doc data is D1, broadcast is in-memory, access-fn WASM is a
# cache). Ordering: cli's cross-script APP_/SHARED_SESSIONS bindings were dropped
# first (PR-E1, c2.6.16 live) so prod's delete clears the 10061 validator. Deploy
# prod before cli for this one (cli's cross-script binding already gone).
[[migrations]]
tag = "v10"
deleted_classes = ["ChatSessions", "AppSessions", "SharedSessions"]

# v11: BackendDO — per-app backend.js runtime (#2856 B3). Local class in every env
# (no cross-script binding), so append-only with no prod-before-cli ordering trap.
[[migrations]]
tag = "v11"
new_classes = ["BackendDO"]

[[d1_databases]]
binding = "DB"
database_name = "dev-vibes-diy-v2"
database_id = "105530de-9900-435b-92f4-15347af604f6"

[[r2_buckets]]
binding = "FS_IDS_BUCKET"
bucket_name = "vibes-diy-fs-ids"

[[queues.producers]]
queue = "vibes-service"
binding = "VIBES_SERVICE"

