name = "vibes-diy-v2-queue-consumer"
main = "./worker.ts"
compatibility_date = "2025-02-24"
compatibility_flags = ["nodejs_compat"]

[browser]
binding = "BROWSER"

[[d1_databases]]
binding = "DB"
database_name = "dev-vibes-diy-v2"
database_id = "105530de-9900-435b-92f4-15347af604f6"

[[r2_buckets]]
binding = "FS_IDS_BUCKET"
bucket_name = "vibes-diy-fs-ids"

[[queues.consumers]]
queue = "vibes-service"
max_batch_size = 10
max_batch_timeout = 1

[observability.logs]
enabled = true
invocation_logs = true

[env.dev]
name = "vibes-diy-v2-queue-consumer-dev"

[env.dev.observability.logs]
enabled = true
invocation_logs = true

[env.dev.browser]
binding = "BROWSER"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "dev-vibes-diy-v2"
database_id = "105530de-9900-435b-92f4-15347af604f6"

[[env.dev.r2_buckets]]
binding = "FS_IDS_BUCKET"
bucket_name = "vibes-diy-fs-ids"

[[env.dev.queues.consumers]]
queue = "vibes-service-dev"
max_batch_size = 10
max_batch_timeout = 1

# Cross-script stub to the main worker's per-vibe BackendDO (#2856). The
# consumer's onChange/arm handlers poke it (`__backend_onchange` /
# `__backend_arm`); QueueCtx silently acks when the binding is absent (the B5
# dark-mode contract), which is why backend.js's queue lanes no-op without
# this. Deploy order in vibes.diy/actions/deploy already puts the main worker
# first, so the class exists when this binding resolves (no 10061 trap).
[env.dev.durable_objects]
bindings = [
  { name = "BACKEND_DO", class_name = "BackendDO", script_name = "vibes-diy-v2-dev" },
]

[env.prod]
name = "vibes-diy-v2-queue-consumer-prod"

[env.prod.observability.logs]
enabled = true
invocation_logs = true

[env.prod.browser]
binding = "BROWSER"

[[env.prod.d1_databases]]
binding = "DB"
database_name = "prod-vibes-diy-v2"
database_id = "0f783eae-91cf-49c4-a706-6e4d2498cb4a"

[[env.prod.r2_buckets]]
binding = "FS_IDS_BUCKET"
bucket_name = "vibes-diy-fs-ids"

[[env.prod.queues.consumers]]
queue = "vibes-service-prod"
max_batch_size = 10
max_batch_timeout = 5

# Cross-script stub to the main worker's per-vibe BackendDO (#2856) — see the
# env.dev note. Found live: with BACKEND_JS=loader on in prod, the fetch lane
# worked but onChange/scheduled stayed dead because the consumer acked pokes
# it had no binding to deliver.
[env.prod.durable_objects]
bindings = [
  { name = "BACKEND_DO", class_name = "BackendDO", script_name = "vibes-diy-v2-prod" },
]
